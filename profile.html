<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=5">
    <title>FoxWeb | Mi Perfil</title>
    <meta name="theme-color" content="#FF4500">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="/assets/css/main.css">
    <link rel="stylesheet" href="/assets/css/bg-main.css">
    <style>
        .profile-header {
            padding: 20px 24px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 16px;
        }
        
        .profile-user {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        
        .profile-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            color: white;
        }
        
        .profile-name {
            font-size: 1.25rem;
            font-weight: 700;
        }
        
        .profile-stats-mini {
            color: var(--text-dim);
            font-size: 0.875rem;
        }
        
        .view-toggle {
            display: flex;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 4px;
        }
        
        .view-btn {
            padding: 8px 16px;
            border: none;
            background: transparent;
            color: var(--text-dim);
            cursor: pointer;
            border-radius: 6px;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s;
        }
        
        .view-btn.active {
            background: var(--primary);
            color: white;
        }
        
        .content-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 16px;
            padding: 24px;
        }
        
        .content-grid.compact-view {
            grid-template-columns: 1fr;
            gap: 8px;
        }
        
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-dim);
        }
        
        .empty-state i {
            font-size: 4rem;
            margin-bottom: 16px;
            opacity: 0.5;
        }
        
        .pagination-btn {
            padding: 8px 14px;
            margin: 0 3px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 4px;
            color: var(--text-main);
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .pagination-btn:hover {
            background: var(--primary);
            border-color: var(--primary);
            color: white;
        }
        
        .pagination-btn--active {
            background: var(--primary);
            border-color: var(--primary);
            color: white;
        }
        
        .pagination-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        @media (max-width: 640px) {
            .content-grid { grid-template-columns: 1fr; }
            .profile-header { flex-direction: column; align-items: flex-start; }
        }
    </style>
    <script src="/scripts/app-init.js" defer></script>
    <script src="/scripts/interface.js" defer></script>
    <script src="/scripts/main-core.js" defer></script>
    <script src="/scripts/main-features.js" defer></script>
    <script src="/scripts/modals.js" defer></script>
    <script src="/scripts/pagination.js" defer></script>
<script>
        document.addEventListener('DOMContentLoaded', function() {
            // Load info message
            loadInfoMessage('profile');
            
            // Read tab from URL
            const urlParams = new URLSearchParams(window.location.search);
            const urlTab = urlParams.get('tab');
            if (urlTab === 'history') {
                switchTab('history');
            } else {
                switchTab('favorites');
            }
            
            loadData();
            
            document.querySelectorAll('.view-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    setView(this.dataset.view);
                });
            });
        });
        
        function loadData() {
            fetch('/database/data.json')
                .then(r => r.json())
                .then(data => {
                    dbData = data;
                    loadProfile();
                });
        }
        
        function loadProfile() {
            const favs = JSON.parse(localStorage.getItem('foxweb_favorites')) || [];
            const hist = JSON.parse(localStorage.getItem('foxweb_download_history')) || [];
            
            document.getElementById('favCount').textContent = favs.length;
            document.getElementById('histCount').textContent = hist.length;
            
            renderFavoritesWithPagination(favs, 'Favoritos');
            renderHistoryWithPagination(hist);
        }
        
        let currentFavPage = 1;
        const ITEMS_PER_PAGE = 12;
        
        function renderFavoritesWithPagination(items, tabId) {
            if (!items.length) {
                document.getElementById('favoritesList').innerHTML = '<div class="empty-state"><i class="fa-regular fa-heart"></i><p>¡No tienes favoritos!, marca como favorito cualquier contenido en la sección de descargas y aparecerán aqui.</p><a href="/downloads" class="btn" style="margin-top:16px;display:inline-flex;padding:12px 24px;background:var(--primary);color:white;border-radius:8px;text-decoration:none;">Explorar</a></div>';
                return;
            }
            
            const totalPages = Math.ceil(items.length / ITEMS_PER_PAGE);
            const start = (currentFavPage - 1) * ITEMS_PER_PAGE;
            const end = start + ITEMS_PER_PAGE;
            const pageItems = items.slice(start, end);
            
            renderFavorites(pageItems, 'favorites', currentFavPage, totalPages, items.length, start);
        }
        
        function renderHistoryWithPagination(items) {
            if (!items.length) {
                document.getElementById('historyList').innerHTML = '<div class="empty-state"><i class="fa-solid fa-clock-rotate-left"></i><p>No hay historial, intenta abrir cualquier contenido y aparecerán aqui.</p></div>';
                return;
            }
            
            const totalPages = Math.ceil(items.length / ITEMS_PER_PAGE);
            const start = (currentFavPage - 1) * ITEMS_PER_PAGE;
            const end = start + ITEMS_PER_PAGE;
            const pageItems = items.slice(start, end);
            
            renderHistory(pageItems, 'history', currentFavPage, totalPages, items.length, start);
        }
        
        function renderFavorites(items, gridId, page, totalPages, totalItems, startIndex = 0) {
            const container = document.getElementById('favoritesList');
            const view = localStorage.getItem('profile_view') || 'cards';
            const isCompact = view === 'compact';
            const grid = document.getElementById('favoritesGrid');
            
            if (isCompact) {
                grid.classList.add('compact-view');
            } else {
                grid.classList.remove('compact-view');
            }
            
            grid.innerHTML = items.map((f, i) => {
                const [name, category] = f.split('_');
                const item = findItem(name, category);
                const icon = item?.icon || CATEGORY_ICONS[category] || 'fa-solid fa-folder';
                const info = item?.info || 'Sin descripción';
                const enlace = item?.enlace || '#';
                const modal = item?.modal || null;
                const hasModal = modal && modal !== 'null';
                
                let btnHtml = '';
                if (hasModal) {
                    btnHtml = `<button class="download-btn" style="flex:1" onclick="openModal('${modal}')">
                        <i class="fa-solid fa-circle-info"></i>Ver
                    </button>`;
                } else if (enlace && enlace !== '#') {
                    btnHtml = `<button class="download-btn" onclick="copyLink('${enlace}')" title="Copiar enlace">
                        <i class="fa-solid fa-link"></i>Copiar
                    </button>
                    <button class="download-btn" style="flex:1" onclick="window.open('${enlace}', '_blank')">
                        <i class="fa-solid fa-download"></i>Abrir
                    </button>`;
                }
                
                return `
                <div class="content-card">
                    <div class="card-header">
                        <div class="card-icon"><i class="${icon}"></i></div>
                        <div class="card-actions">
                            <button class="card-action-btn" onclick="removeFav(${startIndex + i})" title="Eliminar">
                                <i class="fa-solid fa-trash"></i>
                            </button>
                        </div>
                    </div>
                    <div class="card-content">
                        <h3 class="card-title">${name}</h3>
                        <p class="card-description">${info}</p>
                    </div>
                    <div class="card-footer">
                        ${btnHtml}
                    </div>
                </div>`;
            }).join('') + renderPaginationControls('favorites', page, totalPages, totalItems);
        }
        
        function renderHistory(items, gridId, page, totalPages, totalItems, startIndex = 0) {
            const container = document.getElementById('historyList');
            const view = localStorage.getItem('profile_view') || 'cards';
            const idx = (page - 1) * ITEMS_PER_PAGE;
            
            const isCompact = view === 'compact';
            const grid = document.getElementById('historyGrid');
            
            if (isCompact) {
                grid.classList.add('compact-view');
            } else {
                grid.classList.remove('compact-view');
            }
            
            grid.innerHTML = items.map((h, i) => {
                const item = findItem(h.name, h.category);
                const icon = item?.icon || CATEGORY_ICONS[h.category] || 'fa-solid fa-folder';
                const info = item?.info || 'Sin descripción';
                const enlace = item?.enlace || '#';
                
                return `
                <div class="content-card">
                    <div class="card-header">
                        <div class="card-icon"><i class="${icon}"></i></div>
                        <div class="card-actions">
                            <button class="card-action-btn" onclick="removeHist(${idx + i})" title="Eliminar">
                                <i class="fa-solid fa-trash"></i>
                            </button>
                        </div>
                    </div>
                    <div class="card-content">
                        <h3 class="card-title">${h.name}</h3>
                        <p class="card-description">${info}</p>
                    </div>
                    <div class="card-footer">
                        ${enlace && enlace !== '#' ? `
                        <button class="download-btn" onclick="copyLink('${enlace}')" title="Copiar enlace">
                            <i class="fa-solid fa-link"></i>Copiar
                        </button>
                        <button class="download-btn" style="flex:1" onclick="window.open('${enlace}', '_blank')">
                            <i class="fa-solid fa-download"></i>Abrir
                        </button>` : ''}
                    </div>
                </div>`;
            }).join('') + renderPaginationControls('history', page, totalPages, totalItems);
        }
        
        function findItem(name, category) {
            if (!dbData || !category) return null;
            
            const catKey = category.toLowerCase();
            const items = dbData[catKey];
            if (!items) return null;
            
            return items.find(item => item.name === name);
        }
        
        function setView(view) {
            localStorage.setItem('profile_view', view);
            document.querySelectorAll('.view-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.view === view);
            });
            loadProfile();
        }
        
        function goToPage(tab, page) {
            if (tab === 'favorites') {
                currentFavPage = page;
                renderFavoritesWithPagination(JSON.parse(localStorage.getItem('foxweb_favorites')) || [], 'Favoritos');
            } else if (tab === 'history') {
                currentFavPage = page;
                renderHistoryWithPagination(JSON.parse(localStorage.getItem('foxweb_download_history')) || []);
            }
        }
        
        function renderPaginationControls(tab, page, totalPages, totalItems) {
            if (totalPages <= 1) return '';
            
            let pageButtons = '';
            for (let i = 1; i <= totalPages; i++) {
                pageButtons += `<button class="pagination-btn ${page === i ? 'pagination-btn--active' : ''}" onclick="goToPage('${tab}', ${i})" ${page === i ? 'aria-current="page"' : ''} style="padding:8px 12px;margin:0 2px;background:${page === i ? 'var(--primary)' : 'var(--bg-card)'};border:1px solid var(--border);border-radius:4px;color:var(--text-main);cursor:pointer;">${i}</button>`;
            }
            
            return `
            <div style="padding:20px;text-align:center;">
                <button onclick="goToPage('${tab}', ${page > 1 ? page - 1 : 1})" ${page === 1 ? 'disabled' : ''} style="padding:8px 12px;margin:0 4px;background:var(--bg-card);border:1px solid var(--border);border-radius:4px;color:var(--text-dim);cursor:pointer;"><i class="fa-solid fa-chevron-left"></i> Atrás</button>
                ${pageButtons}
                <button onclick="goToPage('${tab}', ${page < totalPages ? page + 1 : totalPages})" ${page === totalPages ? 'disabled' : ''} style="padding:8px 12px;margin:0 4px;background:var(--bg-card);border:1px solid var(--border);border-radius:4px;color:var(--text-dim);cursor:pointer;">Siguiente <i class="fa-solid fa-chevron-right"></i></button>
            </div>`;
        }
        
        function removeFav(index) {
            const favs = JSON.parse(localStorage.getItem('foxweb_favorites')) || [];
            favs.splice(index, 1);
            localStorage.setItem('foxweb_favorites', JSON.stringify(favs));
            loadProfile();
            if (typeof window.showToast === 'function') {
                window.showToast('Eliminado de favoritos', 'info');
            }
        }
        
        function removeHist(index) {
            const hist = JSON.parse(localStorage.getItem('foxweb_download_history')) || [];
            hist.splice(index, 1);
            localStorage.setItem('foxweb_download_history', JSON.stringify(hist));
            loadProfile();
            if (typeof window.showToast === 'function') {
                window.showToast('Eliminado del historial', 'info');
            }
        }
        
        function clearHist() {
            const hist = JSON.parse(localStorage.getItem('foxweb_download_history')) || [];
            if (hist.length === 0) {
                if (typeof window.showToast === 'function') {
                    window.showToast('No es necesario, ya está vacío el historial', 'warning');
                }
                return;
            }
            if (confirm('¿Limpiar todo el historial?')) {
                localStorage.removeItem('foxweb_download_history');
                loadProfile();
                if (typeof window.showToast === 'function') {
                    window.showToast('Historial limpiado', 'success');
                }
            }
        }
        
        function openModal(modalId) {
            window.openModal(modalId);
        }
        
        function copyLink(url) {
            navigator.clipboard.writeText(url).then(() => {
                if (typeof window.showToast === 'function') {
                    window.showToast('Enlace copiado', 'success');
                }
            }).catch(() => {
                if (typeof window.showToast === 'function') {
                    window.showToast('Error al copiar', 'error');
                }
            });
        }
        
        // Load modals when page loads
        fetch('/database/modals.html')
            .then(r => r.text())
            .then(html => {
                document.getElementById('modals-container').innerHTML = html;
            });
    </script>
</head>

<body>
    <header class="main-header" id="header-placeholder"></header>
    
    <main style="padding-top: 20px;">
        <div class="profile-header">
            <div class="profile-user">
                <div class="profile-avatar"><i class="fa-solid fa-user"></i></div>
                <div>
                    <div class="profile-name" id="profileName">Usuario</div>
                    <div class="profile-stats-mini">
                        <span id="favCount">0</span> favoritos · <span id="histCount">0</span> en historial
                    </div>
                    <div class="profile-version" style="font-size: 0.75rem; color: var(--text-dim); margin-top: 4px;">
                        FoxWeb v<span id="foxwebVersion">--</span>
                    </div>
                </div>
            </div>
            <div class="view-toggle">
                <button class="view-btn active" data-view="cards" onclick="setView('cards')">
                    <i class="fa-solid fa-th-large"></i>
                </button>
                <button class="view-btn" data-view="compact" onclick="setView('compact')">
                    <i class="fa-solid fa-list"></i>
                </button>
            </div>
        </div>
        
        <div class="profile-tabs" style="display:flex;gap:8px;padding:0 24px;border-bottom:1px solid var(--border);overflow-x:auto;">
            <button class="profile-tab active" data-tab="favorites" onclick="switchTab('favorites')" style="padding:16px 20px;background:none;border:none;color:var(--text-main);font-weight:600;cursor:pointer;border-bottom:2px solid var(--primary);white-space:nowrap;">
                <i class="fa-solid fa-heart"></i> Favoritos
            </button>
            <button class="profile-tab" data-tab="history" onclick="switchTab('history')" style="padding:16px 20px;background:none;border:none;color:var(--text-dim);cursor:pointer;white-space:nowrap;">
                <i class="fa-solid fa-clock-rotate-left"></i> Historial
            </button>
        </div>
        
        <section id="section-favorites" class="profile-section active" style="display:block;">
            <div id="favoritesList">
                <div id="favoritesGrid" class="content-grid"></div>
            </div>
        </section>
        
        <section id="section-history" class="profile-section" style="display:none;">
            <div style="padding:16px 24px;text-align:right;">
                <button onclick="clearHist()" style="padding:8px 16px;background:var(--bg-card);border:1px solid var(--border);border-radius:8px;color:var(--text-dim);cursor:pointer;">
                    <i class="fa-solid fa-trash"></i> Limpiar historial
                </button>
            </div>
            <div id="historyList">
                <div id="historyGrid" class="content-grid"></div>
            </div>
        </section>
        
        <div id="modals-container"></div>
    </main>
    
    <footer class="main-footer" id="footer-placeholder"></footer>
    
    <script>
        function getUsername() {
            return localStorage.getItem('foxweb_username') || 'Usuario';
        }
        
        document.getElementById('profileName').textContent = getUsername();
        
        function switchTab(tab) {
            currentFavPage = 1;
            document.querySelectorAll('.profile-tab').forEach(btn => {
                btn.style.borderBottom = 'none';
                btn.style.color = 'var(--text-dim)';
                if (btn.dataset.tab === tab) {
                    btn.style.borderBottom = '2px solid var(--primary)';
                    btn.style.color = 'var(--text-main)';
                }
            });
            document.querySelectorAll('.profile-section').forEach(s => s.style.display = 'none');
            document.getElementById('section-' + tab).style.display = 'block';
            
            const url = new URL(window.location);
            url.searchParams.set('tab', tab);
            window.history.replaceState({}, '', url);
}

        // Load FoxWeb version
        fetch('/version.json').then(r => r.json()).then(data => {
            document.getElementById('foxwebVersion').textContent = data.version || '1.0.0';
        }).catch(() => {
            document.getElementById('foxwebVersion').textContent = localStorage.getItem('foxweb_version') || '1.0.0';
        });
    </script>
</body>
</html>
